<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Sign-in error — Smart Screener</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .card{background:#242424;border:1px solid #383838;border-radius:8px;padding:36px;width:420px;box-shadow:0 8px 32px rgba(0,0,0,0.4);text-align:center}
        .icon{width:56px;height:56px;border-radius:50%;background:rgba(239,83,80,0.1);border:1px solid rgba(239,83,80,0.3);margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#ef5350}
        h1{font-size:18px;font-weight:600;color:#fff;margin-bottom:12px}
        .msg{font-size:13px;color:#bbb;line-height:1.5;margin-bottom:24px}
        .btn{display:inline-block;padding:9px 18px;background:#ff6c37;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none}
        .btn:hover{background:#e8530e}
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">!</div>
        <h1>Sign-in failed</h1>
        <div class="msg">{{ message }}</div>
        <a href="{{ url_for('auth.local_login') }}" class="btn">Try again</a>
    </div>
</body>
</html>
