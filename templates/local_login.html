{% extends "_public_base.html" %}

{% block content %}
<style>
    .login-wrap {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 16px;
    }
    .login-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 44px 40px 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 24px 64px -16px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
        position: relative;
        overflow: hidden;
    }
    .login-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent, var(--orange-glow), transparent);
    }
    .login-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
    }
    .login-logo .icon {
        width: 40px; height: 40px;
        border-radius: 10px;
        background: var(--orange-soft);
        border: 1px solid rgba(255,108,55,0.25);
        display: flex; align-items: center; justify-content: center;
        color: var(--orange);
    }
    .login-logo .icon svg { width: 20px; height: 20px; }
    .login-logo .brand { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .login-logo .brand span { color: var(--orange); }
    .login-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
    .login-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 28px; }
    .hint-box {
        background: rgba(255,108,55,0.07);
        border: 1px solid rgba(255,108,55,0.2);
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 24px;
        font-size: 13px;
        color: var(--text-dim);
    }
    .hint-box strong { color: var(--orange); }
    .hint-box code {
        background: rgba(255,108,55,0.12);
        color: var(--orange);
        padding: 1px 6px;
        border-radius: 4px;
        font-family: 'SF Mono', Monaco, monospace;
        font-size: 12.5px;
    }
    .field { margin-bottom: 16px; }
    .field label {
        display: block;
        font-size: 12.5px;
        font-weight: 600;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.4px;
        margin-bottom: 7px;
    }
    .field input {
        width: 100%;
        padding: 11px 14px;
        background: var(--bg-soft);
        border: 1px solid var(--border);
        border-radius: 9px;
        color: var(--text);
        font-size: 14px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        box-sizing: border-box;
    }
    .field input:focus {
        border-color: var(--orange);
        box-shadow: 0 0 0 3px rgba(255,108,55,0.12);
    }
    .error-box {
        background: rgba(239,68,68,0.08);
        border: 1px solid rgba(239,68,68,0.25);
        border-radius: 9px;
        padding: 10px 14px;
        font-size: 13.5px;
        color: #f87171;
        margin-bottom: 18px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .btn-login {
        width: 100%;
        padding: 13px;
        background: var(--orange);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
        box-shadow: 0 4px 14px -4px rgba(255,108,55,0.5);
        margin-top: 6px;
    }
    .btn-login:hover { background: #ff7e4d; transform: translateY(-1px); box-shadow: 0 6px 18px -4px rgba(255,108,55,0.6); }
    .btn-login:active { transform: translateY(0); }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text-mute); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .google-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 12px;
        background: var(--bg-soft);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        text-decoration: none;
        transition: border-color 0.2s, background 0.2s;
    }
    .google-btn:hover { border-color: var(--border-light); background: var(--panel-2); }
    .google-btn svg { width: 18px; height: 18px; }
</style>

<div class="login-wrap">
    <div class="login-card">
        <div class="login-logo">
            <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 6-6"/>
                </svg>
            </div>
            <div class="brand">Smart<span>Screener</span></div>
        </div>

        <h1 class="login-title">Welcome back</h1>
        <p class="login-sub">Sign in to access your dashboard.</p>

        <div class="hint-box">
            🔑 <strong>Dev credentials</strong> — Username: <code>admin</code> &nbsp; Password: <code>admin123</code>
        </div>

        {% if error %}
        <div class="error-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;flex-shrink:0">
                <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
            </svg>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.local_login') }}">
            <div class="field">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" placeholder="admin" autocomplete="username" autofocus>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">Sign In →</button>
        </form>

        {% if google_configured %}
        <div class="divider">or</div>
        <a href="{{ url_for('auth.google_login') }}" class="google-btn">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
        </a>
        {% endif %}
    </div>
</div>
{% endblock %}
